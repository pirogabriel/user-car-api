name: Backend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/test_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: vehicleapi_super_secret_jwt_key_2026_very_long_value

      - name: Package project
        run: ./mvnw package -DskipTests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/test_db
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: vehicleapi_super_secret_jwt_key_2026_very_long_value